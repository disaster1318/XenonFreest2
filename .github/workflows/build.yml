name: Build Xenon APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y wget unzip openjdk-17-jdk zipalign curl python3-pip
        pip3 install --upgrade gdown
        gdown --version

    - name: Download apktool
      run: |
        wget -O apktool.jar "https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar"
        chmod +x apktool.jar

    - name: Download original APK from Google Drive
      run: |
        gdown 1VfR8TKuMECRrKGtstTzOkjb2dmJRASzS -O standoff2.apk
        ls -lh standoff2.apk
        file standoff2.apk

    - name: Decode APK
      run: |
        java -jar apktool.jar d standoff2.apk -o standoff2_decoded

    - name: Replace app icon
      run: |
        if [ -f icon.png ]; then
          find standoff2_decoded -name "ic_launcher*.png" -exec cp icon.png {} \;
          echo "Icon replaced"
        else
          echo "icon.png not found, keeping default"
        fi

    - name: Replace libil2cpp.so and add libxenon.so
      run: |
        mkdir -p standoff2_decoded/lib/arm64-v8a/
        cp jni/libs/arm64-v8a/libxenon.so standoff2_decoded/lib/arm64-v8a/ || echo "libxenon.so not found"

    - name: Rebuild APK
      run: |
        java -jar apktool.jar b standoff2_decoded -o standoff2_mod.apk

    - name: Align APK
      run: |
        zipalign -v -p 4 standoff2_mod.apk standoff2_aligned.apk

    - name: Generate debug keystore
      run: |
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug, O=Android, C=US"

    - name: Sign APK
      run: |
        apksigner sign --ks debug.keystore --ks-pass pass:android --key-pass pass:android --out standoff2_signed.apk standoff2_aligned.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Xenon-Standoff2
        path: standoff2_signed.apk
